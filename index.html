---
layout: index
title: Introduction
---

<div class="grid">
	{% for post in site.posts %}
	<div class="post">
		<h2>{{ post.title }}</h2>
		{% if post.project %}<h3>{{ post.project }}</h3>{% endif %}
		<span class="tech">{% for tag in post.tags %}<kbd>{{ tag }}</kbd>{% endfor %}</span>
		<div class="excerpt">{{ post.excerpt }}</div>
		<a href="{{ post.url }}">Read more...</a>
	</div>
	{% endfor %}
</div>
