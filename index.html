---
layout: index
title: Introduction
---

<div class="grid">
{% for post in site.posts %}
<div class="post">
  <h2>{{ post.title }}</h2>
  {% if post.project %}<h3>{{ post.project }}</h3>{% endif %}
  <span class="tech"><strong>Technologies used:</strong> {{ post.tags | join: ', ' }}</span>
  <div class="excerpt">
    {{ post.excerpt }}
  </div>
  <a href="{{ post.url }}">Read more...</a>
  </div>
{% endfor %}
</div>
