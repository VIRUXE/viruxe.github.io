<!DOCTYPE html>
<html lang="en-GB">
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta charset="utf-8" />
		<title>{{ page.title }} - {{ site.title }}</title>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css" />
		<link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
		<style>
			.excerpt {
				position: relative;
				height: 100px; /* Or however tall you want the excerpt container to be. */
				overflow: hidden;
			}

			.excerpt::after {
				content: "";
				position: absolute;
				bottom: 0;
				left: 0;
				width: 100%;
				height: 100%; /* This controls how "deep" the fade goes. Adjust as needed. */
				background: linear-gradient(
					to bottom,
					rgba(0, 0, 0, 0),
					rgba(17, 25, 31, 0.9)
				); /* Adjust the colors to match your site's background. */
			}

			.post h2 {
				margin-bottom: 0;
			}

			.post h3 {
				margin-left: 1.1rem;
				margin-bottom: 1rem;
				font-size: .8rem;
			}

			.post .tech {
				padding: 0 5px;
				background-color: rgba(0,0,0, 0.);
				border-radius: 10px;
			}
		
		</style>
	</head>
	<body>
		<header class="container">
			<div class="grid">
				<div>
					<img
						id="profile-picture"
						src="https://avatars.githubusercontent.com/u/1616657?v=4" />
					<hgroup>
						<h1>{{ site.title }}</h1>
						<h2>Back-end Software Developer/Solutions Arquitect</h2>
					</hgroup>
				</div>
				<div>
					<p>Description</p>
				</div>
			</div>
		</header>
		<main class="container">{{ content }}</main>
		{% include footer.html %}
	</body>
</html>
